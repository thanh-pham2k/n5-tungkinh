<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Looper</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #5d6a7e;
      --line: #dbe2ee;
      --primary: #1665d8;
      --primary-dark: #0f4ca4;
      --danger: #b42318;
      --shadow: 0 18px 50px rgba(23, 32, 51, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    main {
      width: min(520px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .lesson {
      margin-top: 14px;
    }

    .lesson-title {
      margin-bottom: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fff;
      color: var(--text);
    }

    audio {
      width: 100%;
      margin-top: 16px;
      display: block;
    }

    .controls-row {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 12px;
      align-items: end;
      margin-top: 14px;
    }

    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
      font-weight: 700;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    button.primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      color: #fff;
    }

    button.active {
      border-color: var(--primary);
      background: #eaf2ff;
      color: var(--primary-dark);
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 420px) {
      body {
        padding: 14px;
      }

      main {
        padding: 18px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .controls-row {
        grid-template-columns: 1fr;
      }

      .lesson-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Audio Looper</h1>
    <p>Chọn audio có sẵn hoặc chọn file MP3 từ máy của bạn, audio sẽ phát lặp liên tục.</p>

    <section>
      <h2>Audio public</h2>
      <div id="lesson-list"></div>
    </section>

    <section>
      <label for="looper-file">File MP3 local</label>
      <input type="file" id="looper-file" accept="audio/*">
    </section>

    <audio id="looper-audio" controls loop></audio>

    <div class="controls-row">
      <div>
        <label for="looper-speed">Tốc độ</label>
        <select id="looper-speed">
          <option value="0.5">0.5x</option>
          <option value="0.75">0.75x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="1.75">1.75x</option>
          <option value="2">2x</option>
        </select>
      </div>
    </div>

    <div class="toolbar">
      <button class="primary" id="looper-play" type="button">Play</button>
      <button id="looper-pause" type="button">Pause</button>
      <button id="looper-restart" type="button">Restart</button>
    </div>

    <div class="status" id="looper-status">Chưa chọn file.</div>
  </main>

  <script>
    (() => {
      const lessons = [
        {
          title: "Bài 16",
          tracks: [
            { label: "Nhóm 1", src: "output/16/16_group_01.mp3" },
            { label: "Nhóm 2", src: "output/16/16_group_02.mp3" },
            { label: "Nhóm 3", src: "output/16/16_group_03.mp3" },
            { label: "Nhóm 4", src: "output/16/16_group_04.mp3" },
            { label: "Nhóm 5", src: "output/16/16_group_05.mp3" },
          ],
        },
        {
          title: "Bài 17",
          tracks: [
            { label: "Nhóm 1", src: "output/17/17_group_01.mp3" },
            { label: "Nhóm 2", src: "output/17/17_group_02.mp3" },
            { label: "Nhóm 3", src: "output/17/17_group_03.mp3" },
            { label: "Nhóm 4", src: "output/17/17_group_04.mp3" },
          ],
        },
      ];

      const lessonList = document.getElementById("lesson-list");
      const fileInput = document.getElementById("looper-file");
      const audio = document.getElementById("looper-audio");
      const speed = document.getElementById("looper-speed");
      const status = document.getElementById("looper-status");
      let objectUrl = "";
      let activeTrackButton = null;

      const applySpeed = () => {
        audio.playbackRate = Number(speed.value);
        audio.defaultPlaybackRate = Number(speed.value);
      };

      const revokeLocalUrl = () => {
        if (objectUrl) {
          URL.revokeObjectURL(objectUrl);
          objectUrl = "";
        }
      };

      const setActiveTrackButton = (button) => {
        if (activeTrackButton) {
          activeTrackButton.classList.remove("active");
        }
        activeTrackButton = button;
        if (activeTrackButton) {
          activeTrackButton.classList.add("active");
        }
      };

      const playSource = (src, label, button = null) => {
        revokeLocalUrl();
        setActiveTrackButton(button);
        audio.src = src;
        audio.loop = true;
        applySpeed();
        status.textContent = `Đang phát lặp: ${label}`;
        audio.play().catch(() => {
          status.textContent = `Đã chọn: ${label}. Bấm Play để phát.`;
        });
      };

      lessons.forEach((lesson) => {
        const lessonBox = document.createElement("div");
        lessonBox.className = "lesson";

        const title = document.createElement("div");
        title.className = "lesson-title";
        title.textContent = lesson.title;
        lessonBox.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "lesson-grid";

        lesson.tracks.forEach((track) => {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = track.label;
          button.addEventListener("click", () => {
            playSource(track.src, `${lesson.title} - ${track.label}`, button);
          });
          grid.appendChild(button);
        });

        lessonBox.appendChild(grid);
        lessonList.appendChild(lessonBox);
      });

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (!file) return;

        revokeLocalUrl();
        setActiveTrackButton(null);

        objectUrl = URL.createObjectURL(file);
        audio.src = objectUrl;
        audio.loop = true;
        applySpeed();
        status.textContent = `Đang phát lặp: ${file.name}`;
        audio.play().catch(() => {
          status.textContent = `Đã chọn: ${file.name}. Bấm Play để phát.`;
        });
      });

      speed.addEventListener("change", () => {
        applySpeed();
        status.textContent = `Tốc độ hiện tại: ${speed.value}x`;
      });

      document.getElementById("looper-play").addEventListener("click", () => {
        if (!audio.src) {
          status.textContent = "Vui lòng chọn file MP3 trước.";
          return;
        }
        applySpeed();
        audio.play();
      });

      document.getElementById("looper-pause").addEventListener("click", () => {
        audio.pause();
      });

      document.getElementById("looper-restart").addEventListener("click", () => {
        if (!audio.src) {
          status.textContent = "Vui lòng chọn file MP3 trước.";
          return;
        }
        audio.currentTime = 0;
        applySpeed();
        audio.play();
      });

      window.addEventListener("beforeunload", () => {
        revokeLocalUrl();
      });
    })();
  </script>
</body>
</html>
