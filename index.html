<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Looper</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #5d6a7e;
      --line: #dbe2ee;
      --primary: #1665d8;
      --primary-dark: #0f4ca4;
      --danger: #b42318;
      --shadow: 0 18px 50px rgba(23, 32, 51, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    main {
      width: min(520px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fff;
      color: var(--text);
    }

    audio {
      width: 100%;
      margin-top: 16px;
      display: block;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    button.primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      color: #fff;
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 420px) {
      body {
        padding: 14px;
      }

      main {
        padding: 18px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Audio Looper</h1>
    <p>Chọn file MP3 từ máy của bạn, audio sẽ phát lặp liên tục.</p>

    <label for="looper-file">File MP3</label>
    <input type="file" id="looper-file" accept="audio/*">

    <audio id="looper-audio" controls loop></audio>

    <div class="toolbar">
      <button class="primary" id="looper-play" type="button">Play</button>
      <button id="looper-pause" type="button">Pause</button>
      <button id="looper-restart" type="button">Restart</button>
    </div>

    <div class="status" id="looper-status">Chưa chọn file.</div>
  </main>

  <script>
    (() => {
      const fileInput = document.getElementById("looper-file");
      const audio = document.getElementById("looper-audio");
      const status = document.getElementById("looper-status");
      let objectUrl = "";

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (!file) return;

        if (objectUrl) {
          URL.revokeObjectURL(objectUrl);
        }

        objectUrl = URL.createObjectURL(file);
        audio.src = objectUrl;
        audio.loop = true;
        status.textContent = `Đang phát lặp: ${file.name}`;
        audio.play().catch(() => {
          status.textContent = `Đã chọn: ${file.name}. Bấm Play để phát.`;
        });
      });

      document.getElementById("looper-play").addEventListener("click", () => {
        if (!audio.src) {
          status.textContent = "Vui lòng chọn file MP3 trước.";
          return;
        }
        audio.play();
      });

      document.getElementById("looper-pause").addEventListener("click", () => {
        audio.pause();
      });

      document.getElementById("looper-restart").addEventListener("click", () => {
        if (!audio.src) {
          status.textContent = "Vui lòng chọn file MP3 trước.";
          return;
        }
        audio.currentTime = 0;
        audio.play();
      });

      window.addEventListener("beforeunload", () => {
        if (objectUrl) {
          URL.revokeObjectURL(objectUrl);
        }
      });
    })();
  </script>
</body>
</html>
