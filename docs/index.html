<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Looper</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #5d6a7e;
      --line: #dbe2ee;
      --primary: #1665d8;
      --primary-dark: #0f4ca4;
      --shadow: 0 18px 50px rgba(23, 32, 51, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    main {
      width: min(980px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.25;
    }

    .lesson {
      margin-top: 14px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .tab-button {
      min-height: 42px;
      padding: 0 16px;
    }

    .tab-button[aria-selected="true"] {
      border-color: var(--primary);
      background: #eaf2ff;
      color: var(--primary-dark);
      box-shadow: inset 0 0 0 1px rgba(22, 101, 216, 0.2);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .grammar-layout {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .grammar-selector {
      display: grid;
      gap: 8px;
    }

    .grammar-content {
      min-width: 0;
    }

    .grammar-list {
      display: grid;
      gap: 16px;
    }

    .grammar-topic {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdff;
      padding: 16px;
    }

    .grammar-topic h3 {
      margin: 0 0 10px;
      font-size: 17px;
      line-height: 1.3;
    }

    .grammar-table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0 14px;
      font-size: 14px;
      line-height: 1.45;
    }

    .grammar-table th,
    .grammar-table td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }

    .grammar-table th {
      background: #eef4fc;
      color: var(--text);
    }

    .grammar-note {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .public-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(280px, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .public-column {
      min-width: 0;
    }

    .lesson-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .lesson-switcher button {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
    }

    .lesson-title {
      margin-bottom: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .track-panel {
      padding: 12px 0 0;
      min-height: 220px;
    }

    .vocab-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbff;
      padding: 16px;
      height: 420px;
      position: sticky;
      top: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .vocab-meta {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .vocab-list {
      margin: 0;
      padding-left: 22px;
      display: grid;
      gap: 10px;
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    .vocab-item {
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .vocab-term {
      font-weight: 700;
      color: var(--text);
      margin-right: 8px;
    }

    .vocab-meaning {
      color: var(--muted);
    }

    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fff;
      color: var(--text);
    }

    audio {
      width: 100%;
      margin-top: 16px;
      display: block;
    }

    .controls-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
      margin-top: 14px;
    }

    input[type="number"],
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
      font-weight: 700;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    button.primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      color: #fff;
    }

    button.active {
      border-color: var(--primary);
      background: #eaf2ff;
      color: var(--primary-dark);
      box-shadow: inset 0 0 0 1px rgba(22, 101, 216, 0.2);
    }

    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 420px) {
      body {
        padding: 14px;
      }

      main {
        padding: 18px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .controls-row {
        grid-template-columns: 1fr;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr;
      }

      .grammar-layout {
        grid-template-columns: 1fr;
      }

      .lesson-grid {
        grid-template-columns: 1fr;
      }

      .public-layout {
        grid-template-columns: 1fr;
      }

      .vocab-panel {
        position: static;
        height: 320px;
      }

      .grammar-table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Audio Looper</h1>
    <p>Chọn audio có sẵn hoặc chọn file MP3 từ máy của bạn, audio sẽ phát lặp liên tục.</p>

    <div class="tabs" role="tablist" aria-label="Nội dung học">
      <button class="tab-button" id="tab-audio" type="button" role="tab" aria-selected="true" aria-controls="audio-panel" data-tab-target="audio-panel">Audio public</button>
      <button class="tab-button" id="tab-grammar" type="button" role="tab" aria-selected="false" aria-controls="grammar-panel" data-tab-target="grammar-panel">Grammar</button>
    </div>

    <section class="tab-panel active" id="audio-panel" role="tabpanel" aria-labelledby="tab-audio">
      <h2>Audio public</h2>
      <p class="hint">Track đang chọn sẽ được tô nền xanh.</p>
      <div class="public-layout">
        <div class="public-column">
          <div class="lesson-switcher" id="lesson-switcher"></div>
          <div class="track-panel">
            <div class="lesson-title" id="selected-lesson-title"></div>
            <div class="lesson-grid" id="track-grid"></div>
          </div>
        </div>
        <aside class="vocab-panel" aria-live="polite">
          <h2>Danh sách từ / nghĩa</h2>
          <div class="vocab-meta" id="vocab-meta">Chọn một nhóm để xem danh sách từ/câu.</div>
          <ol class="vocab-list" id="vocab-list"></ol>
        </aside>
      </div>

      <section>
        <label for="looper-file">File MP3 local</label>
        <input type="file" id="looper-file" accept="audio/*">
      </section>

      <audio id="looper-audio" controls loop></audio>

      <div class="controls-row">
        <div>
          <label for="looper-speed">Tốc độ</label>
          <select id="looper-speed">
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="1.75">1.75x</option>
            <option value="2">2x</option>
          </select>
        </div>
        <div>
          <label for="repeat-before-advance">Số lần lặp</label>
          <input type="number" id="repeat-before-advance" min="1" step="1" value="5">
        </div>
        <div>
          <label for="advance-mode">Chuyển nhóm</label>
          <select id="advance-mode">
            <option value="sequential" selected>Tuần tự</option>
            <option value="random">Random</option>
          </select>
        </div>
      </div>

      <div class="toolbar">
        <button class="primary" id="looper-play" type="button">Play</button>
        <button id="looper-pause" type="button">Pause</button>
        <button id="looper-restart" type="button">Restart</button>
      </div>

      <div class="status" id="looper-status">Chưa chọn file.</div>
    </section>

    <section class="tab-panel" id="grammar-panel" role="tabpanel" aria-labelledby="tab-grammar">
      <h2>Grammar</h2>
      <div class="grammar-layout">
        <div class="grammar-selector" id="grammar-lesson-list" aria-label="Danh sách bài ngữ pháp"></div>
        <div class="grammar-content" id="grammar-content">
          <p class="hint">Chọn một bài để xem nội dung ngữ pháp.</p>
        </div>
      </div>

      <template id="grammar-lesson-14-template">
        <div class="grammar-list">
          <article class="grammar-topic">
            <h3>Minna no Nihongo Bài 14: thể て, Vてください, Vています, Vましょうか</h3>
            <p class="grammar-note">Trọng tâm bài 14 là cách chia thể て và dùng thể này để yêu cầu, diễn tả hành động đang diễn ra, đề nghị giúp đỡ, hoặc mô tả hiện tượng tự nhiên.</p>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Nội dung</th>
                  <th>Ý nghĩa ngắn gọn</th>
                  <th>Ví dụ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Thể て</td>
                  <td>Dạng chia quan trọng của động từ</td>
                  <td>たべます → たべて</td>
                </tr>
                <tr>
                  <td>Vてください</td>
                  <td>Hãy / xin hãy làm gì</td>
                  <td>まってください</td>
                </tr>
                <tr>
                  <td>Vています</td>
                  <td>Đang làm gì</td>
                  <td>たべています</td>
                </tr>
                <tr>
                  <td>Vましょうか</td>
                  <td>Để tôi làm giúp nhé?</td>
                  <td>もちましょうか</td>
                </tr>
                <tr>
                  <td>NがVています</td>
                  <td>Mô tả hiện tượng tự nhiên / sự việc khách quan</td>
                  <td>あめが ふっています</td>
                </tr>
              </tbody>
            </table>
          </article>

          <article class="grammar-topic">
            <h3>Cách chia thể て</h3>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Nhóm</th>
                  <th>Quy tắc</th>
                  <th>Ví dụ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Nhóm 1</td>
                  <td>い・ち・り → って</td>
                  <td>かいます → かって</td>
                </tr>
                <tr>
                  <td>Nhóm 1</td>
                  <td>み・び・に → んで</td>
                  <td>のみます → のんで</td>
                </tr>
                <tr>
                  <td>Nhóm 1</td>
                  <td>き → いて / ぎ → いで / し → して</td>
                  <td>かきます → かいて、いそぎます → いそいで、はなします → はなして</td>
                </tr>
                <tr>
                  <td>Đặc biệt</td>
                  <td>いきます → いって</td>
                  <td>えきへ いってください。</td>
                </tr>
                <tr>
                  <td>Nhóm 2</td>
                  <td>Bỏ ます + て</td>
                  <td>たべます → たべて、みます → みて、おきます → おきて</td>
                </tr>
                <tr>
                  <td>Nhóm 3</td>
                  <td>します → して、きます → きて</td>
                  <td>べんきょうします → べんきょうして</td>
                </tr>
              </tbody>
            </table>
          </article>

          <article class="grammar-topic">
            <h3>Mẫu câu chính</h3>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Mẫu</th>
                  <th>Nghĩa</th>
                  <th>Ví dụ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Vて + ください</td>
                  <td>Hãy / xin hãy làm gì</td>
                  <td>なまえを かいてください。 = Hãy viết tên.</td>
                </tr>
                <tr>
                  <td>Vて + います</td>
                  <td>Đang làm gì</td>
                  <td>にほんごを べんきょうしています。 = Đang học tiếng Nhật.</td>
                </tr>
                <tr>
                  <td>Vます bỏ ます + ましょうか</td>
                  <td>Để tôi làm giúp nhé?</td>
                  <td>にもつを もちましょうか。 = Để tôi mang hành lý giúp nhé?</td>
                </tr>
                <tr>
                  <td>N が Vています</td>
                  <td>Mô tả hiện tượng tự nhiên / sự việc khách quan</td>
                  <td>あめが ふっています。 = Trời đang mưa.</td>
                </tr>
              </tbody>
            </table>
          </article>
        </div>
      </template>

      <template id="grammar-lesson-1-template">
        <div class="grammar-list">
          <article class="grammar-topic">
            <h3>Minna no Nihongo Bài 1: N1 は N2 です, じゃありません, ですか</h3>
            <p class="grammar-note">Bài 1 tập trung vào câu danh từ khẳng định, phủ định, nghi vấn, cách xưng hô cơ bản, trợ từ も, trợ từ の, và các câu hỏi だれ / どなた, なんさい / おいくつ.</p>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Nội dung</th>
                  <th>Mẫu câu</th>
                  <th>Nghĩa</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Câu khẳng định</td>
                  <td>N1 は N2 です</td>
                  <td>N1 là N2</td>
                </tr>
                <tr>
                  <td>Câu phủ định</td>
                  <td>N1 は N2 じゃありません</td>
                  <td>N1 không phải là N2</td>
                </tr>
                <tr>
                  <td>Câu nghi vấn</td>
                  <td>N1 は N2 ですか</td>
                  <td>N1 là N2 phải không?</td>
                </tr>
                <tr>
                  <td>Hỏi ai</td>
                  <td>だれ / どなた</td>
                  <td>ai / vị nào</td>
                </tr>
                <tr>
                  <td>Hỏi tuổi</td>
                  <td>なんさい / おいくつ</td>
                  <td>bao nhiêu tuổi</td>
                </tr>
                <tr>
                  <td>Trợ từ も</td>
                  <td>N1 も N2 です</td>
                  <td>N1 cũng là N2</td>
                </tr>
                <tr>
                  <td>Trợ từ の</td>
                  <td>N1 の N2</td>
                  <td>N2 của N1</td>
                </tr>
              </tbody>
            </table>
          </article>

          <article class="grammar-topic">
            <h3>Cách xưng hô cơ bản</h3>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Tiếng Nhật</th>
                  <th>Nghĩa</th>
                  <th>Ghi chú</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>わたし</td>
                  <td>tôi / em / mình / tớ</td>
                  <td>Dùng để nói về bản thân.</td>
                </tr>
                <tr>
                  <td>あなた</td>
                  <td>bạn / anh / chị</td>
                  <td>Ít dùng nếu đã biết tên người kia.</td>
                </tr>
                <tr>
                  <td>～さん</td>
                  <td>anh / chị / cô / chú...</td>
                  <td>Gắn sau tên người khác, không thêm sau tên của mình.</td>
                </tr>
                <tr>
                  <td>～ちゃん</td>
                  <td>bé / bạn thân</td>
                  <td>Thân mật, thường dùng với trẻ em hoặc nữ.</td>
                </tr>
                <tr>
                  <td>～くん</td>
                  <td>bạn nam / em nam</td>
                  <td>Thân mật, thường dùng với nam nhỏ tuổi.</td>
                </tr>
              </tbody>
            </table>
          </article>

          <article class="grammar-topic">
            <h3>です, じゃありません, ですか</h3>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Mẫu</th>
                  <th>Cách dùng</th>
                  <th>Ví dụ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>N1 は N2 です</td>
                  <td>Câu danh từ khẳng định. は trong mẫu này đọc là wa.</td>
                  <td>わたしは ナムです。 = Tôi là Nam.</td>
                </tr>
                <tr>
                  <td>N1 は N2 じゃありません</td>
                  <td>Câu danh từ phủ định. ではありません lịch sự / trang trọng hơn.</td>
                  <td>わたしは がくせいじゃありません。 = Tôi không phải là học sinh.</td>
                </tr>
                <tr>
                  <td>N1 は N2 ですか</td>
                  <td>Câu hỏi đúng / sai. Khi nói trực tiếp có thể bỏ あなたは.</td>
                  <td>がくせいですか。 = Bạn là học sinh à?</td>
                </tr>
                <tr>
                  <td>はい、Nです。</td>
                  <td>Trả lời khi đúng.</td>
                  <td>はい、がくせいです。 = Vâng, tôi là học sinh.</td>
                </tr>
                <tr>
                  <td>いいえ、Nじゃありません。Nです。</td>
                  <td>Trả lời khi sai, rồi nêu thông tin đúng.</td>
                  <td>いいえ、せんせいじゃありません。がくせいです。</td>
                </tr>
              </tbody>
            </table>
          </article>

          <article class="grammar-topic">
            <h3>だれ / どなた, なんさい / おいくつ, も và の</h3>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Mẫu / từ</th>
                  <th>Nghĩa</th>
                  <th>Ví dụ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>だれ / どなた</td>
                  <td>ai / vị nào. どなた lịch sự hơn だれ.</td>
                  <td>あのひとは だれですか。 = Người kia là ai?</td>
                </tr>
                <tr>
                  <td>なんさい / おいくつ</td>
                  <td>bao nhiêu tuổi. おいくつ lịch sự hơn.</td>
                  <td>おいくつですか。 = Bạn bao nhiêu tuổi ạ?</td>
                </tr>
                <tr>
                  <td>N1 も N2 です</td>
                  <td>N1 cũng là N2. も thay cho は khi muốn nói "cũng".</td>
                  <td>わたしも がくせいです。 = Tôi cũng là học sinh.</td>
                </tr>
                <tr>
                  <td>N1 の N2</td>

                  <td>から / まで dùng riêng</td>
                  <td>から = từ, まで = đến.</td>
                  <td>9じから = từ 9 giờ, 5じまで = đến 5 giờ.</td>
                </tr>
                <tr>
                  <td>N1 と N2</td>
                  <td>N1 và N2.</td>
                  <td>日本と ベトナム = Nhật Bản và Việt Nam.</td>
                </tr>
                <tr>
                  <td>Câu + ね</td>
                  <td>nhỉ / nhé / đúng không, dùng để xác nhận hoặc làm câu mềm hơn.</td>
                  <td>土ようびと 日ようびですね。 = Thứ bảy và chủ nhật nhỉ.</td>
                </tr>
              </tbody>
            </table>
          </article>
        </div>
      </template>

      <template id="grammar-lesson-5-template">
        <div class="grammar-list">
          <article class="grammar-topic">
            <h3>Minna no Nihongo Bài 5: いきます・きます・かえります</h3>
            <p class="grammar-note">Bài 5 học các động từ di chuyển đi / đến / về, trợ từ へ chỉ hướng đến địa điểm, で chỉ phương tiện, と chỉ người đi cùng, các từ hỏi どこへ・なんで・だれと・いつ, và trợ từ cuối câu よ.</p>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Nội dung</th>
                  <th>Mẫu</th>
                  <th>Nghĩa / ví dụ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Đi / đến / về</td>
                  <td>いきます・きます・かえります</td>
                  <td>がっこうへ いきます。 = Đi đến trường.</td>
                </tr>
                <tr>
                  <td>Địa điểm + へ</td>
                  <td>Nへ V di chuyển</td>
                  <td>うちへ かえります。 = Về nhà.</td>
                </tr>
                <tr>
                  <td>Hỏi đi đâu</td>
                  <td>どこへ いきますか。</td>
                  <td>Bạn đi đâu?</td>
                </tr>
                <tr>
                  <td>Không đi đâu</td>
                  <td>どこも いきません。</td>
                  <td>Không đi đâu cả.</td>
                </tr>
                <tr>
                  <td>Phương tiện + で</td>
                  <td>Nで いきます。</td>
                  <td>バスで いきます。 = Đi bằng xe buýt.</td>
                </tr>
                <tr>
                  <td>Đi với ai</td>
                  <td>Nと いきます。</td>
                  <td>ともだちと いきます。 = Đi với bạn.</td>
                </tr>
                <tr>
                  <td>Hỏi khi nào</td>
                  <td>いつ いきますか。</td>
                  <td>Khi nào đi?</td>
                </tr>
                <tr>
                  <td>Trợ từ よ</td>
                  <td>Câu + よ</td>
                  <td>じてんしゃで きましたよ。 = Tôi đã đến bằng xe đạp đấy.</td>
                </tr>
              </tbody>
            </table>
          </article>

          <article class="grammar-topic">
            <h3>Ba động từ di chuyển chính</h3>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Động từ</th>
                  <th>Nghĩa</th>
                  <th>Cách dùng</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>いきます</td>
                  <td>đi</td>
                  <td>Dùng khi người nói đi đến nơi khác. Ví dụ: スーパーへ いきます。</td>
                </tr>
                <tr>
                  <td>きます</td>
                  <td>đến</td>
                  <td>Dùng khi ai đó đến vị trí hiện tại hoặc nơi thân thuộc của người nói. Ví dụ: ここへ きます。</td>
                </tr>
                <tr>
                  <td>かえります</td>
                  <td>về</td>
                  <td>Dùng khi về nhà, về nước, về quê hoặc nơi thuộc về mình. Ví dụ: くにへ かえります。</td>
                </tr>
                <tr>
                  <td>Quá khứ</td>
                  <td>いきました / きました / かえりました</td>
                  <td>きのう うちへ かえりました。 = Hôm qua tôi đã về nhà.</td>
                </tr>
              </tbody>
            </table>
          </article>

          <article class="grammar-topic">
            <h3>Địa điểm + へ và どこも + phủ định</h3>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Mẫu</th>
                  <th>Cách dùng</th>
                  <th>Ví dụ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Địa điểm + へ + いきます / きます / かえります</td>
                  <td>Đi / đến / về địa điểm nào đó. へ là trợ từ chỉ hướng, đọc là e.</td>
                  <td>ぎんこうへ いきます。 = Đi ngân hàng.</td>
                </tr>
                <tr>
                  <td>どこへ いきますか。</td>
                  <td>Đi đâu?</td>
                  <td>あした どこへ いきますか。 = Ngày mai bạn đi đâu?</td>
                </tr>
                <tr>
                  <td>どこも + Vません</td>
                  <td>Không đi đâu cả.</td>
                  <td>きょう どこも いきません。</td>
                </tr>
                <tr>
                  <td>どこも + Vませんでした</td>
                  <td>Đã không đi đâu cả.</td>
                  <td>きのう どこも いきませんでした。</td>
                </tr>
              </tbody>
            </table>
          </article>

          <article class="grammar-topic">
            <h3>Phương tiện + で và đi bộ</h3>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Mẫu</th>
                  <th>Nghĩa</th>
                  <th>Ví dụ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Phương tiện + で + V di chuyển</td>
                  <td>Đi / đến / về bằng phương tiện gì.</td>
                  <td>でんしゃで かえります。 = Về bằng tàu điện.</td>
                </tr>
                <tr>
                  <td>なんで いきますか。</td>
                  <td>Đi bằng gì?</td>
                  <td>なんで がっこうへ いきますか。 = Bạn đi đến trường bằng gì?</td>
                </tr>
                <tr>
                  <td>あるいて いきます。</td>
                  <td>Đi bộ.</td>
                  <td>あるいて がっこうへ いきます。 Không dùng あるいてで.</td>
                </tr>
              </tbody>
            </table>
          </article>

          <article class="grammar-topic">
            <h3>Đi với ai, khi nào đi, và よ</h3>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Mẫu</th>
                  <th>Nghĩa</th>
                  <th>Ví dụ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Người / động vật + と + V di chuyển</td>
                  <td>Đi / đến / về cùng với ai hoặc con gì.</td>
                  <td>かぞくと いきます。 = Đi với gia đình.</td>
                </tr>
                <tr>
                  <td>ひとりで</td>
                  <td>Một mình. Không dùng ひとりと.</td>
                  <td>ひとりで うちへ かえります。</td>
                </tr>
                <tr>
                  <td>だれと いきますか。</td>
                  <td>Đi với ai?</td>
                  <td>ともだちと いきます。 = Tôi đi với bạn.</td>
                </tr>
                <tr>
                  <td>いつ いきますか。</td>
                  <td>Khi nào đi? いつ không đi với に.</td>
                  <td>いつ にほんへ いきますか。</td>
                </tr>
                <tr>
                  <td>Câu + よ</td>
                  <td>Nhấn mạnh thông tin mà người nói nghĩ người nghe chưa biết.</td>
                  <td>つぎの でんしゃですよ。 = Chuyến tàu tiếp theo đấy.</td>
                </tr>
              </tbody>
            </table>
          </article>
        </div>
      </template>

      <template id="grammar-lesson-15-template">
        <div class="grammar-list">
          <article class="grammar-topic">
            <h3>Minna no Nihongo Bài 15: Vてもいいですか, Vてもいいです, Vてはいけません</h3>
            <p class="grammar-note">Bài 15 mở rộng cách dùng thể て để xin phép, cho phép, cấm làm gì, nói trạng thái tiếp diễn, thói quen, và dùng trợ từ に với nơi chốn hoặc phương tiện.</p>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Mẫu ngữ pháp</th>
                  <th>Nghĩa chính</th>
                  <th>Ví dụ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Vてもいいですか</td>
                  <td>Tôi làm V có được không?</td>
                  <td>ここで たばこを すってもいいですか。</td>
                </tr>
                <tr>
                  <td>Vてもいいです</td>
                  <td>Được phép làm V</td>
                  <td>はい、すってもいいです。</td>
                </tr>
                <tr>
                  <td>Vてはいけません</td>
                  <td>Không được phép làm V</td>
                  <td>ここで たばこを すってはいけません。</td>
                </tr>
                <tr>
                  <td>Vています</td>
                  <td>Trạng thái tiếp diễn / thói quen</td>
                  <td>けっこんしています。</td>
                </tr>
                <tr>
                  <td>Nに 入ります / 乗ります</td>
                  <td>Vào N / lên phương tiện N</td>
                  <td>へやに はいります。 / バスに のります。</td>
                </tr>
                <tr>
                  <td>Nに Nを V</td>
                  <td>Làm hành động vào vị trí N</td>
                  <td>ここに くるまを とめます。</td>
                </tr>
              </tbody>
            </table>
          </article>

          <article class="grammar-topic">
            <h3>Xin phép, cho phép, và cấm đoán</h3>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Mẫu</th>
                  <th>Cách dùng</th>
                  <th>Ví dụ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Vて + もいいですか</td>
                  <td>Dùng để xin phép người nghe cho mình làm một hành động.</td>
                  <td>エアコンを つけてもいいですか。 = Tôi bật máy lạnh có được không?</td>
                </tr>
                <tr>
                  <td>Vて + もいいです</td>
                  <td>Dùng để cho phép người khác làm một hành động.</td>
                  <td>ここで しゃしんを とってもいいです。 = Chụp ảnh ở đây cũng được.</td>
                </tr>
                <tr>
                  <td>Vて + は + いけません</td>
                  <td>Dùng để nói không được làm gì / cấm làm gì. Vては thường đọc là Vてわ.</td>
                  <td>ここに はいってはいけません。 = Không được vào đây.</td>
                </tr>
                <tr>
                  <td>Cách trả lời khi xin phép</td>
                  <td>Đồng ý: はい、いいです。/ はい、どうぞ。 Từ chối nhẹ: すみません、ちょっと…。</td>
                  <td>しゃしんを とってもいいですか。 はい、どうぞ。</td>
                </tr>
              </tbody>
            </table>
          </article>

          <article class="grammar-topic">
            <h3>Vています: trạng thái và thói quen</h3>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Cách dùng</th>
                  <th>Nghĩa</th>
                  <th>Ví dụ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Trạng thái tiếp diễn</td>
                  <td>Trạng thái đã xảy ra từ quá khứ và vẫn tiếp tục ở hiện tại.</td>
                  <td>けっこんしています。 = Đã kết hôn.</td>
                </tr>
                <tr>
                  <td>住んでいます</td>
                  <td>Đang sống ở đâu đó, dùng Nに.</td>
                  <td>ハノイに すんでいます。 = Đang sống ở Hà Nội.</td>
                </tr>
                <tr>
                  <td>持っています</td>
                  <td>Có / sở hữu.</td>
                  <td>くるまを もっています。 = Có ô tô.</td>
                </tr>
                <tr>
                  <td>知っています</td>
                  <td>Biết. Phủ định đúng là 知りません, không dùng 知っていません.</td>
                  <td>たなかさんを しっています。 / しりません。</td>
                </tr>
                <tr>
                  <td>Thói quen / hoạt động thường xuyên</td>
                  <td>Hành động được lặp lại đều đặn.</td>
                  <td>まいにち にほんごを べんきょうしています。</td>
                </tr>
              </tbody>
            </table>
          </article>

          <article class="grammar-topic">
            <h3>Trợ từ に với 入ります, 乗ります và vị trí tác động</h3>
            <table class="grammar-table">
              <thead>
                <tr>
                  <th>Mẫu</th>
                  <th>Nghĩa</th>
                  <th>Ví dụ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Địa điểm + に + 入ります</td>
                  <td>Vào địa điểm N.</td>
                  <td>へやに はいります。 = Vào phòng.</td>
                </tr>
                <tr>
                  <td>Phương tiện + に + 乗ります</td>
                  <td>Lên / đi phương tiện N.</td>
                  <td>バスに のります。 = Lên xe buýt.</td>
                </tr>
                <tr>
                  <td>Vị trí + に + Nを + V</td>
                  <td>Làm hành động tác động vào một vị trí cụ thể.</td>
                  <td>ここに くるまを とめてもいいですか。 = Tôi đỗ xe ở đây có được không?</td>
                </tr>
                <tr>
                  <td>Nに 書きます / 座ります</td>
                  <td>Viết vào / ngồi vào vị trí N.</td>
                  <td>ノートに かいてください。 / ここに すわってください。</td>
                </tr>
              </tbody>
            </table>
          </article>
        </div>
      </template>
    </section>
  </main>

  <script>
    (() => {
      const assetBasePath = window.location.hostname.endsWith("github.io") ? "/n5-tungkinh/" : "";
      const assetUrl = (path) => `${assetBasePath}${path}`;
      const mapperUrl = assetUrl("data/lesson-mapper.json");

      const lessonSwitcher = document.getElementById("lesson-switcher");
      const selectedLessonTitle = document.getElementById("selected-lesson-title");
      const trackGrid = document.getElementById("track-grid");
      const vocabMeta = document.getElementById("vocab-meta");
      const vocabList = document.getElementById("vocab-list");
      const fileInput = document.getElementById("looper-file");
      const audio = document.getElementById("looper-audio");
      const speed = document.getElementById("looper-speed");
      const repeatInput = document.getElementById("repeat-before-advance");
      const advanceModeSelect = document.getElementById("advance-mode");
      const status = document.getElementById("looper-status");
      const tabButtons = document.querySelectorAll("[data-tab-target]");
      const tabPanels = document.querySelectorAll(".tab-panel");
      const grammarLessonList = document.getElementById("grammar-lesson-list");
      const grammarContent = document.getElementById("grammar-content");

      let lessons = [];
      let objectUrl = "";
      let activeTrackButton = null;
      let currentSource = "";
      let selectedLessonIndex = 0;
      let currentLessonIndex = -1;
      let currentTrackIndex = -1;
      let completedRepeats = 0;
      let repeatBeforeAdvance = 5;
      let advanceMode = "sequential";
      let isPublicTrack = false;

      const grammarLessons = [
        {
          title: "Bài 1",
          templateId: "grammar-lesson-1-template",
        },
        {
          title: "Bài 2",
          templateId: "grammar-lesson-2-template",
        },
        {
          title: "Bài 3",
          templateId: "grammar-lesson-3-template",
        },
        {
          title: "Bài 4",
          templateId: "grammar-lesson-4-template",
        },
        {
          title: "Bài 5",
          templateId: "grammar-lesson-5-template",
        },
        {
          title: "Bài 14",
          templateId: "grammar-lesson-14-template",
        },
        {
          title: "Bài 15",
          templateId: "grammar-lesson-15-template",
        },
      ];

      const applySpeed = () => {
        audio.playbackRate = Number(speed.value);
        audio.defaultPlaybackRate = Number(speed.value);
      };

      const readRepeatBeforeAdvance = () => {
        const value = Number.parseInt(repeatInput.value, 10);
        repeatBeforeAdvance = Number.isFinite(value) && value >= 1 ? value : 1;
        repeatInput.value = String(repeatBeforeAdvance);
        return repeatBeforeAdvance;
      };

      const resetRepeatCounter = () => {
        completedRepeats = 0;
      };

      const getCurrentPublicLabel = () => {
        const lesson = lessons[currentLessonIndex];
        const track = lesson && lesson.tracks[currentTrackIndex];
        if (!lesson || !track) {
          return "";
        }
        return `${lesson.title} - ${track.label}`;
      };

      const updatePublicStatus = (prefix = "Đang phát") => {
        const label = getCurrentPublicLabel();
        if (!label) {
          return;
        }
        status.textContent = `${prefix}: ${label}. Lượt ${completedRepeats + 1}/${repeatBeforeAdvance}.`;
      };

      const revokeLocalUrl = () => {
        if (objectUrl) {
          URL.revokeObjectURL(objectUrl);
          objectUrl = "";
        }
      };

      const selectTab = (targetId) => {
        tabButtons.forEach((button) => {
          const isSelected = button.dataset.tabTarget === targetId;
          button.setAttribute("aria-selected", String(isSelected));
        });

        tabPanels.forEach((panel) => {
          panel.classList.toggle("active", panel.id === targetId);
        });
      };

      const selectGrammarLesson = (lessonIndex) => {
        const lesson = grammarLessons[lessonIndex];
        if (!lesson) {
          return;
        }

        grammarLessonList.querySelectorAll("button").forEach((button, buttonIndex) => {
          button.classList.toggle("active", buttonIndex === lessonIndex);
        });

        const template = document.getElementById(lesson.templateId);
        if (!template) {
          grammarContent.replaceChildren();
          grammarContent.textContent = "Không tìm thấy nội dung ngữ pháp của bài này.";
          return;
        }

        grammarContent.replaceChildren(template.content.cloneNode(true));
      };

      const renderGrammarLessonButtons = () => {
        grammarLessonList.replaceChildren();
        grammarLessons.forEach((lesson, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = lesson.title;
          button.addEventListener("click", () => {
            selectGrammarLesson(index);
          });
          grammarLessonList.appendChild(button);
        });
      };

      const setActiveTrackButton = (button) => {
        if (activeTrackButton) {
          activeTrackButton.classList.remove("active");
        }
        activeTrackButton = button;
        if (activeTrackButton) {
          activeTrackButton.classList.add("active");
        }
      };

      const clearVocabulary = (message = "Chọn một nhóm để xem danh sách từ/câu.") => {
        vocabMeta.textContent = message;
        vocabList.replaceChildren();
      };

      const renderVocabularyItems = (items, label) => {
        if (!items.length) {
          clearVocabulary(`Không có dữ liệu từ/câu cho ${label}.`);
          return;
        }

        vocabMeta.textContent = `Nội dung của ${label} (${items.length} dòng)`;
        const fragment = document.createDocumentFragment();
        items.forEach((item) => {
          const li = document.createElement("li");
          li.className = "vocab-item";

          const term = document.createElement("span");
          term.className = "vocab-term";
          term.textContent = item.japanese;

          const meaning = document.createElement("span");
          meaning.className = "vocab-meaning";
          meaning.textContent = item.vietnamese;

          li.appendChild(term);
          li.appendChild(meaning);
          fragment.appendChild(li);
        });
        vocabList.replaceChildren(fragment);
      };

      const renderVocabulary = (track, label) => {
        renderVocabularyItems(track.items || [], label);
      };

      const getTrackButton = (trackIndex) => {
        return trackGrid.querySelector(`[data-track-index="${trackIndex}"]`);
      };

      const getNextTrackIndex = (lesson) => {
        if (!lesson || !lesson.tracks.length) {
          return -1;
        }

        if (advanceMode === "random") {
          if (lesson.tracks.length === 1) {
            return 0;
          }

          let nextIndex = currentTrackIndex;
          while (nextIndex === currentTrackIndex) {
            nextIndex = Math.floor(Math.random() * lesson.tracks.length);
          }
          return nextIndex;
        }

        return (currentTrackIndex + 1) % lesson.tracks.length;
      };

      const renderTracks = () => {
        const lesson = lessons[selectedLessonIndex];
        selectedLessonTitle.textContent = lesson ? lesson.title : "";
        trackGrid.replaceChildren();

        if (!lesson) {
          return;
        }

        lesson.tracks.forEach((track, trackIndex) => {
          const button = document.createElement("button");
          button.type = "button";
          button.dataset.trackIndex = String(trackIndex);
          button.textContent = track.label;
          if (selectedLessonIndex === currentLessonIndex && track.src === currentSource) {
            button.classList.add("active");
          }
          button.addEventListener("click", () => {
            playSource(track, button, trackIndex);
          });
          trackGrid.appendChild(button);
        });

        const activeTrack = selectedLessonIndex === currentLessonIndex
          ? lesson.tracks.find((track) => track.src === currentSource)
          : null;
        if (activeTrack) {
          renderVocabulary(activeTrack, `${lesson.title} - ${activeTrack.label}`);
        } else {
          clearVocabulary();
        }
      };

      const selectLesson = (index) => {
        selectedLessonIndex = index;
        lessonSwitcher.querySelectorAll("button").forEach((button, buttonIndex) => {
          button.classList.toggle("active", buttonIndex === index);
        });
        renderTracks();
      };

      const playSource = (track, button = null, trackIndex = -1) => {
        const lesson = lessons[selectedLessonIndex];
        const resolvedTrackIndex = trackIndex >= 0 && trackIndex < (lesson?.tracks.length || 0)
          ? trackIndex
          : lesson?.tracks.findIndex((candidate) => candidate.src === track.src) ?? -1;
        revokeLocalUrl();
        currentLessonIndex = selectedLessonIndex;
        currentTrackIndex = resolvedTrackIndex;
        resetRepeatCounter();
        readRepeatBeforeAdvance();
        isPublicTrack = true;
        setActiveTrackButton(button || getTrackButton(currentTrackIndex));
        currentSource = track.src;
        audio.src = assetUrl(track.src);
        audio.loop = false;
        applySpeed();
        if (lesson) {
          renderVocabulary(track, `${lesson.title} - ${track.label}`);
        }
        updatePublicStatus();
        audio.play().catch(() => {
          updatePublicStatus("Đã chọn");
        });
      };

      const handlePublicTrackEnded = () => {
        if (!isPublicTrack) {
          return;
        }

        const lesson = lessons[currentLessonIndex];
        if (!lesson || currentTrackIndex < 0) {
          return;
        }

        completedRepeats += 1;
        readRepeatBeforeAdvance();

        if (completedRepeats < repeatBeforeAdvance) {
          audio.currentTime = 0;
          applySpeed();
          updatePublicStatus();
          audio.play().catch(() => {
            updatePublicStatus("Đã chọn");
          });
          return;
        }

        const nextTrackIndex = getNextTrackIndex(lesson);
        if (nextTrackIndex < 0) {
          return;
        }

        selectedLessonIndex = currentLessonIndex;
        lessonSwitcher.querySelectorAll("button").forEach((button, buttonIndex) => {
          button.classList.toggle("active", buttonIndex === selectedLessonIndex);
        });
        renderTracks();
        playSource(lesson.tracks[nextTrackIndex], getTrackButton(nextTrackIndex), nextTrackIndex);
      };

      const renderLessonButtons = () => {
        lessonSwitcher.replaceChildren();
        lessons.forEach((lesson, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = lesson.title;
          button.addEventListener("click", () => {
            selectLesson(index);
          });
          lessonSwitcher.appendChild(button);
        });
      };

      const loadLessons = async () => {
        const response = await fetch(mapperUrl, { cache: "no-cache" });
        if (!response.ok) {
          throw new Error(`Cannot load mapper: ${response.status}`);
        }

        const payload = await response.json();
        return Array.isArray(payload.lessons) ? payload.lessons : [];
      };

      const init = async () => {
        renderGrammarLessonButtons();
        clearVocabulary("Đang tải mapper bài học...");
        try {
          lessons = await loadLessons();
          renderLessonButtons();
          if (!lessons.length) {
            selectedLessonTitle.textContent = "";
            clearVocabulary("Không có bài học nào trong mapper.");
            return;
          }
          selectLesson(0);
        } catch (error) {
          console.error(error);
          selectedLessonTitle.textContent = "";
          lessonSwitcher.replaceChildren();
          clearVocabulary("Không tải được mapper bài học.");
          status.textContent = "Không tải được dữ liệu bài học.";
        }
      };

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => {
          selectTab(button.dataset.tabTarget);
        });
      });

      repeatInput.addEventListener("change", () => {
        readRepeatBeforeAdvance();
        if (isPublicTrack) {
          updatePublicStatus();
        }
      });

      advanceModeSelect.addEventListener("change", () => {
        advanceMode = advanceModeSelect.value;
        if (isPublicTrack) {
          updatePublicStatus();
        }
      });

      audio.addEventListener("ended", handlePublicTrackEnded);

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (!file) return;

        revokeLocalUrl();
        setActiveTrackButton(null);
        currentSource = "";
        currentLessonIndex = -1;
        currentTrackIndex = -1;
        resetRepeatCounter();
        isPublicTrack = false;
        clearVocabulary("File local không có danh sách từ/câu đi kèm.");

        objectUrl = URL.createObjectURL(file);
        audio.src = objectUrl;
        audio.loop = true;
        applySpeed();
        status.textContent = `Đang phát lặp: ${file.name}`;
        audio.play().catch(() => {
          status.textContent = `Đã chọn: ${file.name}. Bấm Play để phát.`;
        });
      });

      speed.addEventListener("change", () => {
        applySpeed();
        if (isPublicTrack) {
          updatePublicStatus();
          return;
        }
        status.textContent = `Tốc độ hiện tại: ${speed.value}x`;
      });

      document.getElementById("looper-play").addEventListener("click", () => {
        if (!audio.src) {
          status.textContent = "Vui lòng chọn file MP3 trước.";
          return;
        }
        applySpeed();
        if (isPublicTrack) {
          updatePublicStatus();
        }
        audio.play();
      });

      document.getElementById("looper-pause").addEventListener("click", () => {
        audio.pause();
      });

      document.getElementById("looper-restart").addEventListener("click", () => {
        if (!audio.src) {
          status.textContent = "Vui lòng chọn file MP3 trước.";
          return;
        }
        audio.currentTime = 0;
        if (isPublicTrack) {
          resetRepeatCounter();
        }
        applySpeed();
        if (isPublicTrack) {
          updatePublicStatus();
        }
        audio.play();
      });

      window.addEventListener("beforeunload", () => {
        revokeLocalUrl();
      });

      init();
    })();
  </script>
</body>
</html>
