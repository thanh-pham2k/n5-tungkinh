<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Looper</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #5d6a7e;
      --line: #dbe2ee;
      --primary: #1665d8;
      --primary-dark: #0f4ca4;
      --shadow: 0 18px 50px rgba(23, 32, 51, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    main {
      width: min(980px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.25;
    }

    .lesson {
      margin-top: 14px;
    }

    .public-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(280px, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .public-column {
      min-width: 0;
    }

    .lesson-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .lesson-switcher button {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
    }

    .lesson-title {
      margin-bottom: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .track-panel {
      padding: 12px 0 0;
      min-height: 220px;
    }

    .vocab-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbff;
      padding: 16px;
      height: 420px;
      position: sticky;
      top: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .vocab-meta {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .vocab-list {
      margin: 0;
      padding-left: 22px;
      display: grid;
      gap: 10px;
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    .vocab-item {
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .vocab-term {
      font-weight: 700;
      color: var(--text);
      margin-right: 8px;
    }

    .vocab-meaning {
      color: var(--muted);
    }

    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fff;
      color: var(--text);
    }

    audio {
      width: 100%;
      margin-top: 16px;
      display: block;
    }

    .controls-row {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 12px;
      align-items: end;
      margin-top: 14px;
    }

    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
      font-weight: 700;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    button.primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      color: #fff;
    }

    button.active {
      border-color: var(--primary);
      background: #eaf2ff;
      color: var(--primary-dark);
      box-shadow: inset 0 0 0 1px rgba(22, 101, 216, 0.2);
    }

    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 420px) {
      body {
        padding: 14px;
      }

      main {
        padding: 18px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .controls-row {
        grid-template-columns: 1fr;
      }

      .lesson-grid {
        grid-template-columns: 1fr;
      }

      .public-layout {
        grid-template-columns: 1fr;
      }

      .vocab-panel {
        position: static;
        height: 320px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Audio Looper</h1>
    <p>Chọn audio có sẵn hoặc chọn file MP3 từ máy của bạn, audio sẽ phát lặp liên tục.</p>

    <section>
      <h2>Audio public</h2>
      <p class="hint">Track đang chọn sẽ được tô nền xanh.</p>
      <div class="public-layout">
        <div class="public-column">
          <div class="lesson-switcher" id="lesson-switcher"></div>
          <div class="track-panel">
            <div class="lesson-title" id="selected-lesson-title"></div>
            <div class="lesson-grid" id="track-grid"></div>
          </div>
        </div>
        <aside class="vocab-panel" aria-live="polite">
          <h2>Danh sách từ / nghĩa</h2>
          <div class="vocab-meta" id="vocab-meta">Chọn một nhóm để xem danh sách từ/câu.</div>
          <ol class="vocab-list" id="vocab-list"></ol>
        </aside>
      </div>
    </section>

    <section>
      <label for="looper-file">File MP3 local</label>
      <input type="file" id="looper-file" accept="audio/*">
    </section>

    <audio id="looper-audio" controls loop></audio>

    <div class="controls-row">
      <div>
        <label for="looper-speed">Tốc độ</label>
        <select id="looper-speed">
          <option value="0.5">0.5x</option>
          <option value="0.75">0.75x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="1.75">1.75x</option>
          <option value="2">2x</option>
        </select>
      </div>
    </div>

    <div class="toolbar">
      <button class="primary" id="looper-play" type="button">Play</button>
      <button id="looper-pause" type="button">Pause</button>
      <button id="looper-restart" type="button">Restart</button>
    </div>

    <div class="status" id="looper-status">Chưa chọn file.</div>
  </main>

  <script>
    (() => {
      const lessons = [
        {
          title: "Bài 16",
          inputSrc: "input/16.txt",
          tracks: [
            { label: "Nhóm 1", src: "output/16/16_group_01.mp3" },
            { label: "Nhóm 2", src: "output/16/16_group_02.mp3" },
            { label: "Nhóm 3", src: "output/16/16_group_03.mp3" },
            { label: "Nhóm 4", src: "output/16/16_group_04.mp3" },
            { label: "Nhóm 5", src: "output/16/16_group_05.mp3" },
          ],
        },
        {
          title: "Bài 17",
          inputSrc: "input/17.txt",
          tracks: [
            { label: "Nhóm 1", src: "output/17/17_group_01.mp3" },
            { label: "Nhóm 2", src: "output/17/17_group_02.mp3" },
            { label: "Nhóm 3", src: "output/17/17_group_03.mp3" },
            { label: "Nhóm 4", src: "output/17/17_group_04.mp3" },
          ],
        },
      ];

      lessons.forEach((lesson) => {
        lesson.tracks.forEach((track, index) => {
          track.groupIndex = index + 1;
        });
      });

      const lessonSwitcher = document.getElementById("lesson-switcher");
      const selectedLessonTitle = document.getElementById("selected-lesson-title");
      const trackGrid = document.getElementById("track-grid");
      const vocabMeta = document.getElementById("vocab-meta");
      const vocabList = document.getElementById("vocab-list");
      const fileInput = document.getElementById("looper-file");
      const audio = document.getElementById("looper-audio");
      const speed = document.getElementById("looper-speed");
      const status = document.getElementById("looper-status");
      let objectUrl = "";
      let activeTrackButton = null;
      let currentSource = "";
      let selectedLessonIndex = 0;
      const lessonVocabulary = new Map();

      const applySpeed = () => {
        audio.playbackRate = Number(speed.value);
        audio.defaultPlaybackRate = Number(speed.value);
      };

      const revokeLocalUrl = () => {
        if (objectUrl) {
          URL.revokeObjectURL(objectUrl);
          objectUrl = "";
        }
      };

      const setActiveTrackButton = (button) => {
        if (activeTrackButton) {
          activeTrackButton.classList.remove("active");
        }
        activeTrackButton = button;
        if (activeTrackButton) {
          activeTrackButton.classList.add("active");
        }
      };

      const clearVocabulary = (message = "Chọn một nhóm để xem danh sách từ/câu.") => {
        vocabMeta.textContent = message;
        vocabList.replaceChildren();
      };

      const parseVocabularyGroups = (text) => {
        const groups = [];
        let current = [];

        text.split(/\r?\n/).forEach((rawLine) => {
          const line = rawLine.trim();
          if (!line) {
            return;
          }

          if (line === "---") {
            if (current.length) {
              groups.push(current);
              current = [];
            }
            return;
          }

          const separatorIndex = line.indexOf("\t");
          if (separatorIndex === -1) {
            return;
          }

          const japanese = line.slice(0, separatorIndex).trim();
          const vietnamese = line.slice(separatorIndex + 1).trim();
          if (japanese && vietnamese) {
            current.push({ japanese, vietnamese });
          }
        });

        if (current.length) {
          groups.push(current);
        }

        return groups;
      };

      const loadLessonVocabulary = async (lesson) => {
        if (lessonVocabulary.has(lesson.inputSrc)) {
          return lessonVocabulary.get(lesson.inputSrc);
        }

        const response = await fetch(lesson.inputSrc, { cache: "no-cache" });
        if (!response.ok) {
          throw new Error(`Cannot load ${lesson.inputSrc}: ${response.status}`);
        }

        const groups = parseVocabularyGroups(await response.text());
        lessonVocabulary.set(lesson.inputSrc, groups);
        return groups;
      };

      const renderVocabularyItems = (items, label) => {
        if (!items.length) {
          clearVocabulary(`Không có dữ liệu từ/câu cho ${label}.`);
          return;
        }

        vocabMeta.textContent = `Nội dung của ${label} (${items.length} dòng)`;
        const fragment = document.createDocumentFragment();
        items.forEach((item, index) => {
          const li = document.createElement("li");
          li.className = "vocab-item";

          const term = document.createElement("span");
          term.className = "vocab-term";
          term.textContent = item.japanese;

          const meaning = document.createElement("span");
          meaning.className = "vocab-meaning";
          meaning.textContent = item.vietnamese;

          li.appendChild(term);
          li.appendChild(meaning);
          fragment.appendChild(li);
        });
        vocabList.replaceChildren(fragment);
      };

      const renderVocabulary = async (lesson, track, label) => {
        clearVocabulary(`Đang tải danh sách từ/câu cho ${label}...`);
        try {
          const groups = await loadLessonVocabulary(lesson);
          const items = groups[track.groupIndex - 1] || [];
          renderVocabularyItems(items, label);
        } catch (error) {
          clearVocabulary(`Không tải được danh sách từ/câu cho ${label}.`);
          console.error(error);
        }
      };

      const renderTracks = () => {
        const lesson = lessons[selectedLessonIndex];
        selectedLessonTitle.textContent = lesson ? lesson.title : "";
        trackGrid.replaceChildren();

        if (!lesson) {
          return;
        }

        lesson.tracks.forEach((track) => {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = track.label;
          if (track.src === currentSource) {
            button.classList.add("active");
          }
          button.addEventListener("click", () => {
            playSource(track.src, `${lesson.title} - ${track.label}`, button);
          });
          trackGrid.appendChild(button);
        });

        const activeTrack = lesson.tracks.find((track) => track.src === currentSource);
        if (activeTrack) {
          renderVocabulary(lesson, activeTrack, `${lesson.title} - ${activeTrack.label}`);
        } else {
          clearVocabulary();
        }
      };

      const selectLesson = (index) => {
        selectedLessonIndex = index;
        lessonSwitcher.querySelectorAll("button").forEach((button, buttonIndex) => {
          button.classList.toggle("active", buttonIndex === index);
        });
        renderTracks();
      };

      const playSource = (src, label, button = null) => {
        revokeLocalUrl();
        setActiveTrackButton(button);
        currentSource = src;
        audio.src = src;
        audio.loop = true;
        applySpeed();
        const lesson = lessons[selectedLessonIndex];
        const track = lesson.tracks.find((item) => item.src === src);
        if (lesson && track) {
          renderVocabulary(lesson, track, label);
        }
        status.textContent = `Đang phát lặp: ${label}`;
        audio.play().catch(() => {
          status.textContent = `Đã chọn: ${label}. Bấm Play để phát.`;
        });
      };

      lessons.forEach((lesson, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = lesson.title;
        button.addEventListener("click", () => {
          selectLesson(index);
        });
        lessonSwitcher.appendChild(button);
      });

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (!file) return;

        revokeLocalUrl();
        setActiveTrackButton(null);
        currentSource = "";
        clearVocabulary("File local không có danh sách từ/câu đi kèm.");

        objectUrl = URL.createObjectURL(file);
        audio.src = objectUrl;
        audio.loop = true;
        applySpeed();
        status.textContent = `Đang phát lặp: ${file.name}`;
        audio.play().catch(() => {
          status.textContent = `Đã chọn: ${file.name}. Bấm Play để phát.`;
        });
      });

      speed.addEventListener("change", () => {
        applySpeed();
        status.textContent = `Tốc độ hiện tại: ${speed.value}x`;
      });

      document.getElementById("looper-play").addEventListener("click", () => {
        if (!audio.src) {
          status.textContent = "Vui lòng chọn file MP3 trước.";
          return;
        }
        applySpeed();
        audio.play();
      });

      document.getElementById("looper-pause").addEventListener("click", () => {
        audio.pause();
      });

      document.getElementById("looper-restart").addEventListener("click", () => {
        if (!audio.src) {
          status.textContent = "Vui lòng chọn file MP3 trước.";
          return;
        }
        audio.currentTime = 0;
        applySpeed();
        audio.play();
      });

      window.addEventListener("beforeunload", () => {
        revokeLocalUrl();
      });

      selectLesson(0);
    })();
  </script>
</body>
</html>
