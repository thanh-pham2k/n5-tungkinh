<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Looper</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #5d6a7e;
      --line: #dbe2ee;
      --primary: #1665d8;
      --primary-dark: #0f4ca4;
      --shadow: 0 18px 50px rgba(23, 32, 51, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    main {
      width: min(980px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.25;
    }

    .lesson {
      margin-top: 14px;
    }

    .public-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(280px, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .public-column {
      min-width: 0;
    }

    .lesson-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .lesson-switcher button {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
    }

    .lesson-title {
      margin-bottom: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .track-panel {
      padding: 12px 0 0;
      min-height: 220px;
    }

    .vocab-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbff;
      padding: 16px;
      height: 420px;
      position: sticky;
      top: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .vocab-meta {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .vocab-list {
      margin: 0;
      padding-left: 22px;
      display: grid;
      gap: 10px;
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    .vocab-item {
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .vocab-term {
      font-weight: 700;
      color: var(--text);
      margin-right: 8px;
    }

    .vocab-meaning {
      color: var(--muted);
    }

    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fff;
      color: var(--text);
    }

    audio {
      width: 100%;
      margin-top: 16px;
      display: block;
    }

    .controls-row {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 12px;
      align-items: end;
      margin-top: 14px;
    }

    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
      font-weight: 700;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    button.primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      color: #fff;
    }

    button.active {
      border-color: var(--primary);
      background: #eaf2ff;
      color: var(--primary-dark);
      box-shadow: inset 0 0 0 1px rgba(22, 101, 216, 0.2);
    }

    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 420px) {
      body {
        padding: 14px;
      }

      main {
        padding: 18px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .controls-row {
        grid-template-columns: 1fr;
      }

      .lesson-grid {
        grid-template-columns: 1fr;
      }

      .public-layout {
        grid-template-columns: 1fr;
      }

      .vocab-panel {
        position: static;
        height: 320px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Audio Looper</h1>
    <p>Chọn audio có sẵn hoặc chọn file MP3 từ máy của bạn, audio sẽ phát lặp liên tục.</p>

    <section>
      <h2>Audio public</h2>
      <p class="hint">Track đang chọn sẽ được tô nền xanh.</p>
      <div class="public-layout">
        <div class="public-column">
          <div class="lesson-switcher" id="lesson-switcher"></div>
          <div class="track-panel">
            <div class="lesson-title" id="selected-lesson-title"></div>
            <div class="lesson-grid" id="track-grid"></div>
          </div>
        </div>
        <aside class="vocab-panel" aria-live="polite">
          <h2>Danh sách từ / nghĩa</h2>
          <div class="vocab-meta" id="vocab-meta">Chọn một nhóm để xem danh sách từ/câu.</div>
          <ol class="vocab-list" id="vocab-list"></ol>
        </aside>
      </div>
    </section>

    <section>
      <label for="looper-file">File MP3 local</label>
      <input type="file" id="looper-file" accept="audio/*">
    </section>

    <audio id="looper-audio" controls loop></audio>

    <div class="controls-row">
      <div>
        <label for="looper-speed">Tốc độ</label>
        <select id="looper-speed">
          <option value="0.5">0.5x</option>
          <option value="0.75">0.75x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="1.75">1.75x</option>
          <option value="2">2x</option>
        </select>
      </div>
    </div>

    <div class="toolbar">
      <button class="primary" id="looper-play" type="button">Play</button>
      <button id="looper-pause" type="button">Pause</button>
      <button id="looper-restart" type="button">Restart</button>
    </div>

    <div class="status" id="looper-status">Chưa chọn file.</div>
  </main>

  <script>
    (() => {
      const lessons = [
        {
          title: "Bài 16",
          tracks: [
            { label: "Nhóm 1", src: "output/16/16_group_01.mp3" },
            { label: "Nhóm 2", src: "output/16/16_group_02.mp3" },
            { label: "Nhóm 3", src: "output/16/16_group_03.mp3" },
            { label: "Nhóm 4", src: "output/16/16_group_04.mp3" },
            { label: "Nhóm 5", src: "output/16/16_group_05.mp3" },
          ],
        },
        {
          title: "Bài 17",
          tracks: [
            { label: "Nhóm 1", src: "output/17/17_group_01.mp3" },
            { label: "Nhóm 2", src: "output/17/17_group_02.mp3" },
            { label: "Nhóm 3", src: "output/17/17_group_03.mp3" },
            { label: "Nhóm 4", src: "output/17/17_group_04.mp3" },
          ],
        },
      ];

      const lessonSwitcher = document.getElementById("lesson-switcher");
      const selectedLessonTitle = document.getElementById("selected-lesson-title");
      const trackGrid = document.getElementById("track-grid");
      const vocabMeta = document.getElementById("vocab-meta");
      const vocabList = document.getElementById("vocab-list");
      const fileInput = document.getElementById("looper-file");
      const audio = document.getElementById("looper-audio");
      const speed = document.getElementById("looper-speed");
      const status = document.getElementById("looper-status");
      let objectUrl = "";
      let activeTrackButton = null;
      let currentSource = "";
      let selectedLessonIndex = 0;

      const trackVocabulary = {
        "output/16/16_group_01.mp3": [
          { japanese: "のります", vietnamese: "lên, đi phương tiện" },
          { japanese: "おります", vietnamese: "xuống phương tiện" },
          { japanese: "のりかえます", vietnamese: "chuyển, đổi tuyến xe" },
          { japanese: "あびます", vietnamese: "tắm, dội" },
          { japanese: "いれます", vietnamese: "cho vào, bỏ vào" },
          { japanese: "だします", vietnamese: "lấy ra, nộp, gửi" },
          { japanese: "はいります", vietnamese: "vào" },
          { japanese: "でます", vietnamese: "ra, tốt nghiệp" },
          { japanese: "やめます", vietnamese: "nghỉ, bỏ" },
          { japanese: "おします", vietnamese: "bấm, nhấn" },
        ],
        "output/16/16_group_02.mp3": [
          { japanese: "わかい", vietnamese: "trẻ" },
          { japanese: "ながい", vietnamese: "dài" },
          { japanese: "みじかい", vietnamese: "ngắn" },
          { japanese: "あかるい", vietnamese: "sáng" },
          { japanese: "くらい", vietnamese: "tối" },
          { japanese: "せが たかい", vietnamese: "cao" },
          { japanese: "あたまが いい", vietnamese: "thông minh" },
          { japanese: "からだ", vietnamese: "cơ thể" },
          { japanese: "あたま", vietnamese: "đầu" },
          { japanese: "かみ", vietnamese: "tóc" },
        ],
        "output/16/16_group_03.mp3": [
          { japanese: "かお", vietnamese: "mặt" },
          { japanese: "め", vietnamese: "mắt" },
          { japanese: "みみ", vietnamese: "tai" },
          { japanese: "くち", vietnamese: "miệng" },
          { japanese: "は", vietnamese: "răng" },
          { japanese: "おなか", vietnamese: "bụng" },
          { japanese: "あし", vietnamese: "chân" },
          { japanese: "サービス", vietnamese: "dịch vụ" },
          { japanese: "ジョギング", vietnamese: "chạy bộ" },
          { japanese: "シャワー", vietnamese: "vòi sen, tắm vòi sen" },
        ],
        "output/16/16_group_04.mp3": [
          { japanese: "みどり", vietnamese: "màu xanh lá, cây xanh" },
          { japanese: "おてら", vietnamese: "chùa" },
          { japanese: "じんじゃ", vietnamese: "đền thần đạo" },
          { japanese: "りゅうがくせい", vietnamese: "du học sinh" },
          { japanese: "ばん", vietnamese: "số, lượt" },
          { japanese: "どうやって", vietnamese: "bằng cách nào" },
          { japanese: "どの", vietnamese: "cái nào" },
          { japanese: "どれ", vietnamese: "cái nào" },
          { japanese: "まず", vietnamese: "trước tiên" },
          { japanese: "つぎに", vietnamese: "tiếp theo" },
        ],
        "output/16/16_group_05.mp3": [
          { japanese: "それから", vietnamese: "sau đó" },
          { japanese: "さいごに", vietnamese: "cuối cùng" },
          { japanese: "すごいですね", vietnamese: "tuyệt quá, ghê quá" },
          { japanese: "いいえ、まだまだです", vietnamese: "không, tôi còn kém lắm" },
          { japanese: "おひきだしですか", vietnamese: "anh chị rút tiền phải không" },
          {
            japanese: "まず キャッシュカードを いれてください",
            vietnamese: "đầu tiên hãy cho thẻ vào",
          },
          { japanese: "あんしょうばんごう", vietnamese: "mã PIN" },
          { japanese: "きんがく", vietnamese: "số tiền" },
          { japanese: "かくにん", vietnamese: "xác nhận" },
          { japanese: "ボタン", vietnamese: "nút bấm" },
        ],
        "output/17/17_group_01.mp3": [
          { japanese: "おぼえます", vietnamese: "nhớ, ghi nhớ" },
          { japanese: "わすれます", vietnamese: "quên" },
          { japanese: "なくします", vietnamese: "làm mất" },
          { japanese: "はらいます", vietnamese: "trả tiền" },
          { japanese: "かえします", vietnamese: "trả lại" },
          { japanese: "でかけます", vietnamese: "ra ngoài" },
          { japanese: "ぬぎます", vietnamese: "cởi" },
          { japanese: "もっていきます", vietnamese: "mang đi" },
          { japanese: "もってきます", vietnamese: "mang đến" },
          { japanese: "しんぱいします", vietnamese: "lo lắng" },
        ],
        "output/17/17_group_02.mp3": [
          { japanese: "ざんぎょうします", vietnamese: "làm thêm giờ" },
          { japanese: "しゅっちょうします", vietnamese: "đi công tác" },
          { japanese: "のみます", vietnamese: "uống" },
          { japanese: "はいります", vietnamese: "vào" },
          { japanese: "たいせつ", vietnamese: "quan trọng" },
          { japanese: "だいじょうぶ", vietnamese: "ổn, không sao" },
          { japanese: "あぶない", vietnamese: "nguy hiểm" },
          { japanese: "もんだい", vietnamese: "vấn đề, câu hỏi" },
          { japanese: "こたえ", vietnamese: "câu trả lời" },
          { japanese: "きんえん", vietnamese: "cấm hút thuốc" },
        ],
        "output/17/17_group_03.mp3": [
          { japanese: "ほけんしょう", vietnamese: "thẻ bảo hiểm" },
          { japanese: "かぜ", vietnamese: "cảm lạnh" },
          { japanese: "ねつ", vietnamese: "sốt" },
          { japanese: "びょうき", vietnamese: "bệnh" },
          { japanese: "くすり", vietnamese: "thuốc" },
          { japanese: "おふろ", vietnamese: "bồn tắm, tắm" },
          { japanese: "うわぎ", vietnamese: "áo khoác" },
          { japanese: "したぎ", vietnamese: "đồ lót" },
          { japanese: "せんせい", vietnamese: "bác sĩ, giáo viên" },
          { japanese: "びょういん", vietnamese: "bệnh viện" },
        ],
        "output/17/17_group_04.mp3": [
          { japanese: "じかん", vietnamese: "thời gian" },
          { japanese: "〜までに", vietnamese: "trước hạn, trước lúc" },
          { japanese: "〜まで", vietnamese: "đến, cho đến" },
          { japanese: "ですから", vietnamese: "vì vậy, cho nên" },
          { japanese: "どうしましたか", vietnamese: "bị sao vậy?" },
          { japanese: "のど", vietnamese: "cổ họng" },
          { japanese: "いたい", vietnamese: "đau" },
          { japanese: "のどが いたいです", vietnamese: "đau họng" },
          { japanese: "かぜを ひきました", vietnamese: "bị cảm" },
          { japanese: "それから", vietnamese: "sau đó, ngoài ra" },
          { japanese: "おだいじに", vietnamese: "giữ gìn sức khỏe nhé" },
        ],
      };

      const applySpeed = () => {
        audio.playbackRate = Number(speed.value);
        audio.defaultPlaybackRate = Number(speed.value);
      };

      const revokeLocalUrl = () => {
        if (objectUrl) {
          URL.revokeObjectURL(objectUrl);
          objectUrl = "";
        }
      };

      const setActiveTrackButton = (button) => {
        if (activeTrackButton) {
          activeTrackButton.classList.remove("active");
        }
        activeTrackButton = button;
        if (activeTrackButton) {
          activeTrackButton.classList.add("active");
        }
      };

      const clearVocabulary = (message = "Chọn một nhóm để xem danh sách từ/câu.") => {
        vocabMeta.textContent = message;
        vocabList.replaceChildren();
      };

      const renderVocabulary = (src, label) => {
        const items = trackVocabulary[src] || [];
        if (!items.length) {
          clearVocabulary(`Không có dữ liệu từ/câu cho ${label}.`);
          return;
        }

        vocabMeta.textContent = `Nội dung của ${label} (${items.length} dòng)`;
        const fragment = document.createDocumentFragment();
        items.forEach((item, index) => {
          const li = document.createElement("li");
          li.className = "vocab-item";

          const term = document.createElement("span");
          term.className = "vocab-term";
          term.textContent = item.japanese;

          const meaning = document.createElement("span");
          meaning.className = "vocab-meaning";
          meaning.textContent = item.vietnamese;

          li.appendChild(term);
          li.appendChild(meaning);
          fragment.appendChild(li);
        });
        vocabList.replaceChildren(fragment);
      };

      const renderTracks = () => {
        const lesson = lessons[selectedLessonIndex];
        selectedLessonTitle.textContent = lesson ? lesson.title : "";
        trackGrid.replaceChildren();

        if (!lesson) {
          return;
        }

        lesson.tracks.forEach((track) => {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = track.label;
          if (track.src === currentSource) {
            button.classList.add("active");
          }
          button.addEventListener("click", () => {
            playSource(track.src, `${lesson.title} - ${track.label}`, button);
          });
          trackGrid.appendChild(button);
        });

        const activeTrack = lesson.tracks.find((track) => track.src === currentSource);
        if (activeTrack) {
          renderVocabulary(activeTrack.src, `${lesson.title} - ${activeTrack.label}`);
        } else {
          clearVocabulary();
        }
      };

      const selectLesson = (index) => {
        selectedLessonIndex = index;
        lessonSwitcher.querySelectorAll("button").forEach((button, buttonIndex) => {
          button.classList.toggle("active", buttonIndex === index);
        });
        renderTracks();
      };

      const playSource = (src, label, button = null) => {
        revokeLocalUrl();
        setActiveTrackButton(button);
        currentSource = src;
        audio.src = src;
        audio.loop = true;
        applySpeed();
        renderVocabulary(src, label);
        status.textContent = `Đang phát lặp: ${label}`;
        audio.play().catch(() => {
          status.textContent = `Đã chọn: ${label}. Bấm Play để phát.`;
        });
      };

      lessons.forEach((lesson, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = lesson.title;
        button.addEventListener("click", () => {
          selectLesson(index);
        });
        lessonSwitcher.appendChild(button);
      });

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (!file) return;

        revokeLocalUrl();
        setActiveTrackButton(null);
        currentSource = "";
        clearVocabulary("File local không có danh sách từ/câu đi kèm.");

        objectUrl = URL.createObjectURL(file);
        audio.src = objectUrl;
        audio.loop = true;
        applySpeed();
        status.textContent = `Đang phát lặp: ${file.name}`;
        audio.play().catch(() => {
          status.textContent = `Đã chọn: ${file.name}. Bấm Play để phát.`;
        });
      });

      speed.addEventListener("change", () => {
        applySpeed();
        status.textContent = `Tốc độ hiện tại: ${speed.value}x`;
      });

      document.getElementById("looper-play").addEventListener("click", () => {
        if (!audio.src) {
          status.textContent = "Vui lòng chọn file MP3 trước.";
          return;
        }
        applySpeed();
        audio.play();
      });

      document.getElementById("looper-pause").addEventListener("click", () => {
        audio.pause();
      });

      document.getElementById("looper-restart").addEventListener("click", () => {
        if (!audio.src) {
          status.textContent = "Vui lòng chọn file MP3 trước.";
          return;
        }
        audio.currentTime = 0;
        applySpeed();
        audio.play();
      });

      window.addEventListener("beforeunload", () => {
        revokeLocalUrl();
      });

      selectLesson(0);
    })();
  </script>
</body>
</html>
