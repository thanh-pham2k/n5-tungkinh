<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JLPT N5 Listening - Bai 1</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #1e293b;
      --muted: #64748b;
      --line: #dbe3ef;
      --primary: #0f766e;
      --primary-soft: #d9f3ef;
      --ok: #147a3d;
      --bad: #b42318;
      --warn: #b45309;
      --shadow: 0 12px 30px rgba(15, 23, 42, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .95);
      backdrop-filter: blur(10px);
    }

    .header-inner {
      max-width: 1160px;
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.15rem, 2.2vw, 1.75rem);
      letter-spacing: 0;
    }

    .subtitle {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .score {
      min-width: max-content;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      background: var(--panel);
      color: var(--muted);
      font-weight: 650;
    }

    main {
      max-width: 1160px;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 18px;
    }

    .sidebar {
      position: sticky;
      top: 88px;
      align-self: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sidebar-title {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-weight: 750;
    }

    .segment-list {
      max-height: calc(100vh - 160px);
      overflow: auto;
    }

    .segment-tab {
      width: 100%;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 0;
      border-bottom: 1px solid var(--line);
      padding: 10px 14px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }

    .segment-tab:hover,
    .segment-tab.active {
      background: var(--primary-soft);
    }

    .segment-tab .label {
      display: block;
      font-weight: 700;
    }

    .segment-tab .meta {
      display: block;
      color: var(--muted);
      font-size: .82rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      flex: 0 0 10px;
      border-radius: 999px;
      background: #cbd5e1;
    }

    .segment-tab.correct .status-dot {
      background: var(--ok);
    }

    .segment-tab.wrong .status-dot {
      background: var(--bad);
    }

    .content {
      min-width: 0;
    }

    .lesson-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .lesson-head {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--primary);
      font-size: .85rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.25rem, 2.4vw, 2rem);
      letter-spacing: 0;
    }

    .time-range {
      min-width: max-content;
      color: var(--muted);
      font-weight: 700;
    }

    .player-block {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    audio {
      width: 100%;
      display: block;
    }

    .section {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child {
      border-bottom: 0;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .line {
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }

    .line:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .jp {
      margin: 0;
      font-size: 1.18rem;
      font-weight: 750;
    }
    .vi,
    .explain {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .question {
      margin: 0 0 14px;
      font-size: 1.1rem;
      font-weight: 750;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .option {
      min-height: 72px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      text-align: left;
      cursor: pointer;
    }

    .option:hover {
      border-color: var(--primary);
      background: #f4fbfa;
    }

    .option.selected {
      border-color: var(--primary);
      box-shadow: inset 0 0 0 1px var(--primary);
    }

    .option.correct {
      border-color: var(--ok);
      background: #ecfdf3;
    }

    .option.wrong {
      border-color: var(--bad);
      background: #fff1f0;
    }

    .option-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      margin-right: 8px;
      border-radius: 999px;
      background: #eef2f7;
      font-weight: 800;
    }

    .option-main {
      font-weight: 800;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .option-meaning {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: .93rem;
    }

    .feedback {
      min-height: 28px;
      margin-top: 14px;
      font-weight: 750;
    }

    .feedback.ok {
      color: var(--ok);
    }

    .feedback.bad {
      color: var(--bad);
    }

    .controls {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      background: #fbfcfe;
    }

    .nav-button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 14px;
      background: #fff;
      color: var(--ink);
      font-weight: 750;
      cursor: pointer;
    }

    .nav-button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .nav-button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    @media (max-width: 820px) {
      .header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .score {
        width: 100%;
      }

      main {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      .sidebar {
        position: static;
      }

      .segment-list {
        max-height: none;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .segment-tab {
        min-height: 54px;
        border-right: 1px solid var(--line);
      }

      .segment-tab .meta {
        display: none;
      }

      .lesson-head,
      .controls {
        flex-direction: column;
      }

      .time-range,
      .nav-button {
        width: 100%;
      }

      .options {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div>
        <h1>JLPT N5 Listening - Bài 1</h1>
        <p class="subtitle">Nghe từng đoạn, chọn đáp án, xem lại script Nhật - nghĩa Việt.</p>
      </div>
      <div class="score" id="score">0 / 16 câu đúng</div>
    </div>
  </header>

  <main>
    <aside class="sidebar" aria-label="Danh sách đoạn hội thoại">

      <div class="segment-list" id="segmentList"></div>
    </aside>

    <section class="content">

          <div>
            <p class="eyebrow" id="partName"></p>
            <h2 id="segmentTitle"></h2>
          </div>
          <div class="time-range" id="timeRange"></div>
        </div>

        <div class="player-block">
          <audio id="audioPlayer" controls preload="metadata"></audio>
        </div>

        <div class="section">
          <h3>Script hội thoại</h3>
          <div id="transcript"></div>
        </div>

        <div class="section">
          <h3>Câu hỏi trắc nghiệm</h3>
          <p class="question" id="question"></p>
          <p class="vi" id="questionMeaning"></p>
          <div class="options" id="options"></div>
          <div class="feedback" id="feedback"></div>
        </div>

        <div class="controls">
          <button class="nav-button" id="prevBtn" type="button">← Đoạn trước</button>
          <button class="nav-button primary" id="nextBtn" type="button">Đoạn tiếp →</button>
        </div>
      </article>
    </section>
  </main>

        explain: "菜々子 nói 「私は8歳です」."
      },
      {
        part: "Phần 4: Tuổi",
        title: "Đoạn 16 - Câu 3",
        time: "00:04:51 - 00:05:04",
        audio: "audio/lesson-1/segment-16.mp3",
        transcript: [
          ["A", "あの方はケリーさんです。"],
          ["B", "あの、おいくつですか。"],
          ["A", "ケリーさんは、えっと、26です。"],
          ["B", "そうですか。"]
        ],
        question: ["何歳ですか。", "Bao nhiêu tuổi?"],
        options: [["A", "28歳", "28 tuổi"], ["B", "71歳", "71 tuổi"], ["C", "8歳", "8 tuổi"], ["D", "26歳", "26 tuổi"]],
        answer: "D",
        explain: "Người nói nói 「26です」."
      }
    ];

    const state = {
      current: 0,
      answers: JSON.parse(localStorage.getItem("n5-listening-bai-1") || "{}")
    };

    const els = {
      score: document.getElementById("score"),
      segmentList: document.getElementById("segmentList"),
      partName: document.getElementById("partName"),
      segmentTitle: document.getElementById("segmentTitle"),
      timeRange: document.getElementById("timeRange"),
      audioPlayer: document.getElementById("audioPlayer"),
      transcript: document.getElementById("transcript"),
      question: document.getElementById("question"),
      questionMeaning: document.getElementById("questionMeaning"),
      options: document.getElementById("options"),
      feedback: document.getElementById("feedback"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn")
    };

    function saveAnswers() {
      localStorage.setItem("n5-listening-bai-1", JSON.stringify(state.answers));
    }

    function answerStatus(index) {
      const picked = state.answers[index];
      if (!picked) return "";
      return picked === segments[index].answer ? "correct" : "wrong";
    }

    function renderTabs() {
      els.segmentList.innerHTML = "";
      segments.forEach((segment, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = ["segment-tab", index === state.current ? "active" : "", answerStatus(index)].filter(Boolean).join(" ");
        button.innerHTML = `
          <span>
            <span class="label">${index + 1}</span>
            <span class="meta">${segment.part.replace("Phần ", "P")}</span>
          </span>
          <span class="status-dot" aria-hidden="true"></span>
        `;
        button.addEventListener("click", () => renderSegment(index));
        els.segmentList.appendChild(button);
      });
    }

    function renderTranscript(segment) {
      els.transcript.innerHTML = "";
      segment.transcript.forEach(([speaker, jp, vi]) => {
        const line = document.createElement("div");
        line.className = "line";
        line.innerHTML = `
          <p class="jp">${speaker}: ${jp}</p>
          <p class="vi">Nghĩa: ${vi}</p>
        `;
        els.transcript.appendChild(line);
      });
    }

    function renderOptions(segment, index) {
      els.options.innerHTML = "";
      const picked = state.answers[index];
      segment.options.forEach(([key, text, meaning = ""]) => {
        const button = document.createElement("button");
        const classes = ["option"];
        if (picked === key) classes.push("selected");
        if (picked && key === segment.answer) classes.push("correct");
        if (picked === key && picked !== segment.answer) classes.push("wrong");
        button.type = "button";
        button.className = classes.join(" ");
        button.innerHTML = `
          <span class="option-key">${key}</span>
          <span class="option-main">${text}</span>
          <span class="option-meaning">${meaning}</span>
        `;
        button.addEventListener("click", () => {
          state.answers[index] = key;
          saveAnswers();
          renderSegment(index);
        });
        els.options.appendChild(button);
      });

      els.feedback.className = "feedback";
      if (!picked) {
        els.feedback.textContent = "";
      } else if (picked === segment.answer) {
        els.feedback.classList.add("ok");
        els.feedback.textContent = `Đúng. ${segment.explain}`;
      } else {
        els.feedback.classList.add("bad");
        els.feedback.textContent = `Chưa đúng. Đáp án đúng là ${segment.answer}. ${segment.explain}`;
      }
    }

    function updateScore() {
      const correct = segments.filter((segment, index) => state.answers[index] === segment.answer).length;
      els.score.textContent = `${correct} / ${segments.length} câu đúng`;
    }

    function renderSegment(index) {
      state.current = Math.max(0, Math.min(index, segments.length - 1));
      const segment = segments[state.current];
      els.partName.textContent = segment.part;
      els.segmentTitle.textContent = segment.title;
      els.timeRange.textContent = segment.time;
      els.audioPlayer.src = segment.audio;
      els.question.textContent = segment.question[0];
      els.questionMeaning.textContent = `Nghĩa: ${segment.question[2]}`;
      renderTranscript(segment);
      renderOptions(segment, state.current);
      els.prevBtn.disabled = state.current === 0;
      els.nextBtn.disabled = state.current === segments.length - 1;
      renderTabs();
      updateScore();
    }

    els.prevBtn.addEventListener("click", () => renderSegment(state.current - 1));
    els.nextBtn.addEventListener("click", () => renderSegment(state.current + 1));

    renderSegment(0);
  </script>
</body>
</html>
